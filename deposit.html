body{

</style>
</head>

<body>

<div class="nav">
<a href="index.html">Home</a>
<a href="dashboard.html">Dashboard</a>

<h1>Deposit Funds</h1>

<div class="card">
<h2>Payment Details</h2>

<p><b>UPI ID:</b></p>
<p>psmtoken.in@okicici</p>

<p>Minimum Deposit ₹1000</p>

</div>

<div class="card">

<h2>Submit Deposit</h2>

<input type="number" id="amount" placeholder="Enter Amount">

<input type="text" id="txnId" placeholder="Transaction ID">

<br><br>

<button class="btn" id="submitDeposit">
Submit Deposit
</button>

</div>
  <script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getAuth,
onAuthStateChanged
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
getFirestore,
doc,
getDoc,
collection,
getDocs,
updateDoc,
query,
where
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBOySIYXBy8XqpSr2WjC-k7KBMZZMFWlgk",
  authDomain: "uddhar-community.firebaseapp.com",
  projectId: "uddhar-community",
  storageBucket: "uddhar-community.firebasestorage.app",
  messagingSenderId: "784644070311",
  appId: "1:784644070311:web:c434d4ce4e30a30c14f482"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let currentUser = null;

onAuthStateChanged(auth,(user)=>{
currentUser = user;
});

document.getElementById("submitDeposit")
.addEventListener("click", async ()=>{

if(!currentUser){
alert("Please Login First");
return;
}

const amount =
document.getElementById("amount").value;

const txnId =
document.getElementById("txnId").value;

if(!amount || !txnId){
alert("Fill all fields");
return;
}

await addDoc(collection(db,"deposits"),{

uid: currentUser.uid,
amount: Number(amount),
txnId: txnId,
status: "pending",
createdAt: new Date()

});

alert("Deposit Request Submitted");

});

  </script>

</body>
</html>
