<!DOCTYPE html>
<html>
<head>
<title>Register - Uddhar Community</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body{
font-family:Arial;
background:#0b1020;
color:white;
text-align:center;
padding:20px;
}
form{
max-width:400px;
margin:auto;
background:#1e293b;
padding:20px;
border-radius:12px;
}
input{
width:90%;
padding:12px;
margin:10px;
border:none;
border-radius:8px;
}
button{
background:#22c55e;
color:white;
padding:12px 25px;
border:none;
border-radius:8px;
}
</style>
</head>
<body>

<h1>Register</h1>

<form id="registerForm">
<input type="text" id="name" placeholder="Full Name" required>
  <input type="email" id="email" placeholder="Email Address" required>
<input type="tel" id="mobile" placeholder="Mobile Number" required>
<input type="text" id="referral" placeholder="Referral ID">
<input type="password" id="password" placeholder="Password" required>

<button type="submit">Create Account</button>
</form>
  <script>
const params = new URLSearchParams(window.location.search);
const ref = params.get("ref");

if(ref){
document.getElementById("referral").value = ref;
}
  </script>
  <script type="module">
    import {
  getFirestore,
  doc,
  setDoc,
  getDoc,
  runTransaction,
  collection,
  query,
  where,
  getDocs,
  updateDoc
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

import {
  getAuth,
  createUserWithEmailAndPassword
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyBOySIYXBy8XqpSr2WjC-k7KBMZZMFWlgk",
  authDomain: "uddhar-community.firebaseapp.com",
  projectId: "uddhar-community",
  storageBucket: "uddhar-community.firebasestorage.app",
  messagingSenderId: "784644070311",
  appId: "1:784644070311:web:c434d4ce4e30a30c14f482",
  measurementId: "G-9FY98FB3ET"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
    const db = getFirestore(app);

document.getElementById("registerForm")
.addEventListener("submit", function(e){

  e.preventDefault();
  const name =
document.getElementById("name").value;

const mobile =
document.getElementById("mobile").value;

const referral =
document.getElementById("referral").value;

  const email =
  document.getElementById("email").value;

  const password =
  document.getElementById("password").value;

  createUserWithEmailAndPassword(
    auth,
    email,
    password
  )

  .then(async (userCredential)=>{

  const user = userCredential.user;
    const counterRef = doc(db, "system", "counter");

const newNumber = await runTransaction(db, async (transaction) => {

const counterDoc = await transaction.get(counterRef);

if (!counterDoc.exists()) {

transaction.set(counterRef, {
userCount: 1001
});

return 1001;

}

const nextNumber = counterDoc.data().userCount + 1;

transaction.update(counterRef, {
userCount: nextNumber
});

return nextNumber;

});

const userId = "UD" + newNumber;

  await setDoc(doc(db,"users",user.uid),{
name: name,
email: email,
mobile: mobile,
referral: referral,

uid: user.uid,
userId: userId,

role: "user",
wallet: 0,
status: "active",

directIncome: 0,
levelIncome: 0,
totalReferrals: 0,
totalTeam: 0,

createdAt: new Date()
});
  alert("Account Created Successfully");

  window.location.href = "dashboard.html";

})

  .catch((error)=>{

    alert(error.message);

  });

});
</script>

</body>
</html>
