<!DOCTYPE html>
<html>
<head>
<title>Admin Panel</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body{
font-family:Arial;
background:#0b1020;
color:white;
padding:20px;
}
.card{
background:#1e293b;
padding:15px;
border-radius:10px;
margin-bottom:10px;
}
  table{
width:100%;
border-collapse:collapse;
font-size:14px;
  }

th,td{
padding:8px;
word-break:break-word;
text-align:left;
}
</style>
</head>
<body>

<h1>Admin Panel</h1>
  <div class="card">
<h3>User List</h3>
<div style="overflow-x:auto;">
<table style="width:100%;color:white;">
<thead>
<tr>
<th>User ID</th>
<th>Name</th>
<th>Email</th>
<th>Wallet</th>
<th>Action</th>
</tr>
</thead>

<tbody id="userTable">
</tbody>

</table>
</div>
  </div>

<div class="card">
<h3>Total Users</h3>
<p id="totalUsers">Loading...</p>
</div>

<div class="card">
<h3>Admin Access Granted</h3>
<p>Welcome Admin</p>
</div>
  <div class="card">
<h3>Deposit Requests</h3>

<div style="overflow-x:auto;">
<table style="width:100%;color:white;">
<thead>
<tr>
<th>User ID</th>
<th>Amount</th>
<th>Status</th>
<th>Action</th>
</tr>
</thead>

<tbody id="depositTable">
</tbody>

</table>
</div>
  </div>
<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getAuth,
onAuthStateChanged
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
getFirestore,
doc,
getDoc,
collection,
getDocs,
updateDoc
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBOySIYXBy8XqpSr2WjC-k7KBMZZMFWlgk",
  authDomain: "uddhar-community.firebaseapp.com",
  projectId: "uddhar-community",
  storageBucket: "uddhar-community.firebasestorage.app",
  messagingSenderId: "784644070311",
  appId: "1:784644070311:web:c434d4ce4e30a30c14f482"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

onAuthStateChanged(auth, async (user)=>{

if(!user){
alert("Please Login First");
window.location.href="login.html";
return;
}

const userDoc =
await getDoc(doc(db,"users",user.uid));

if(!userDoc.exists()){
window.location.href="index.html";
return;
}

const data = userDoc.data();

if(data.role !== "admin"){
alert("Access Denied");
window.location.href="dashboard.html";
return;
}
  const usersSnapshot =
await getDocs(collection(db,"users"));

document.getElementById("totalUsers").innerText =
usersSnapshot.size;
  let html = "";

usersSnapshot.forEach((doc)=>{

const user = doc.data();

html += `
<tr>
<td>${user.userId || ""}</td>
<td>${user.name || ""}</td>
<td>${user.email || ""}</td>
<td>${user.wallet || 0}</td>
<td>
<button onclick="updateWallet('${doc.id}')">
Edit Wallet
</button>
</td>
</tr>
`;

});

document.getElementById("userTable").innerHTML = html;
  let depositHtml = "";

const depositsSnapshot =
await getDocs(collection(db,"deposits"));

depositsSnapshot.forEach((depositDoc)=>{

const deposit = depositDoc.data();

depositHtml += `
<tr>
<td>${deposit.uid || ""}</td>
<td>₹${deposit.amount || 0}</td>
<td>${deposit.status || "pending"}</td>
<td>
<button onclick="approveDeposit('${depositDoc.id}')">
Approve
</button>
</td>
</tr>
`;

});


document.getElementById("depositTable").innerHTML =
depositHtml;
});
  window.updateWallet = async function(uid){

const amount = prompt("Enter New Wallet Balance");

if(amount === null) return;

await updateDoc(
doc(db,"users",uid),
{
wallet: Number(amount)
}
);

alert("Wallet Updated Successfully");

location.reload();

  }
window.approveDeposit = async function(id){

alert("Approve button clicked");

}
</script>
</body>
</html>
