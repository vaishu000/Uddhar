<!DOCTYPE html>
<html>
<head>
<title>Admin Panel</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body{
font-family:Arial;
background:#0b1020;
color:white;
padding:20px;
}
.card{
background:#1e293b;
padding:15px;
border-radius:10px;
margin-bottom:10px;
}
</style>
</head>
<body>

<h1>Admin Panel</h1>

<div class="card">
<h3>Total Users</h3>
<p id="totalUsers">Loading...</p>
</div>

<div class="card">
<h3>Admin Access Granted</h3>
<p>Welcome Admin</p>
</div>
<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getAuth,
onAuthStateChanged
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
getFirestore,
doc,
getDoc
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBOySIYXBy8XqpSr2WjC-k7KBMZZMFWlgk",
  authDomain: "uddhar-community.firebaseapp.com",
  projectId: "uddhar-community",
  storageBucket: "uddhar-community.firebasestorage.app",
  messagingSenderId: "784644070311",
  appId: ""1:784644070311:web:c434d4ce4e30a30c14f482
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

onAuthStateChanged(auth, async (user)=>{

if(!user){
alert("Please Login First");
window.location.href="login.html";
return;
}

const userDoc =
await getDoc(doc(db,"users",user.uid));

if(!userDoc.exists()){
window.location.href="index.html";
return;
}

const data = userDoc.data();

if(data.role !== "admin"){
alert("Access Denied");
window.location.href="dashboard.html";
return;
}

});

</script>
</body>
</html>
