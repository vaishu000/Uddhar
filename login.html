<!DOCTYPE html>
<html>
<head>
<title>Login - Uddhar Community</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body{
font-family:Arial;
background:#0b1020;
color:white;
text-align:center;
padding:20px;
}
form{
max-width:400px;
margin:auto;
background:#1e293b;
padding:20px;
border-radius:12px;
}
input{
width:90%;
padding:12px;
margin:10px;
border:none;
border-radius:8px;
}
button{
background:#2563eb;
color:white;
padding:12px 25px;
border:none;
border-radius:8px;
}
</style>
</head>
<body>

<h1>Login</h1>

<form id="loginForm">
<input type="email" id="email" placeholder="Email" required>
<input type="password" id="password" placeholder="Password" required>
<br>

<label>
<input type="checkbox" onclick="showPassword()">
 Show Password
</label>

<br><br>
 <label>
<input type="checkbox">
 Remember Me
</label>

<br><br>
<button type="submit">Login</button>
 <p>
Don't have an account?
<a href="register.html" style="color:#22c55e;">
Register Now
</a>
 </p>
</form>
  <script>
function showPassword() {
  var x = document.getElementById("password");

  if (x.type === "password") {
    x.type = "text";
  } else {
    x.type = "password";
  }
}
  </script>

</body>
</html>
